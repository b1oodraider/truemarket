# =============================================================================
# Security scan — OWASP Dependency Check + Trivy (Docker image).
# Не блокирует PR (длительный, 10-15 минут).
# Запускается:
#   - еженедельно (понедельник 03:00 UTC)
#   - по ручному триггеру (workflow_dispatch)
#   - при изменениях в backend/pom.xml или backend/Dockerfile
#
# Required secrets:
#   NVD_API_KEY — токен для https://nvd.nist.gov/developers/request-an-api-key
#                 (без него скан в 10 раз медленнее из-за rate-limit).
# =============================================================================
name: Security scan

on:
  schedule:
    - cron: "0 3 * * 1"   # каждый понедельник 03:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/pom.xml"
      - "backend/Dockerfile"
      - ".github/workflows/security-scan.yml"

concurrency:
  group: security-scan
  cancel-in-progress: false

jobs:

  owasp-dependency-check:
    name: OWASP Dependency Check (Maven deps → CVE)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write   # для SARIF upload
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Cache OWASP DC database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-dc-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            owasp-dc-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        working-directory: backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B -P security verify -DskipTests

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend/target/dependency-check-report.sarif
          category: owasp-dependency-check

      - name: Upload HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dc-report
          path: backend/target/dependency-check-report.html
          retention-days: 30

  trivy-docker:
    name: Trivy (Docker image → CVE + misconfig)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: ./mvnw -B -DskipTests package

      - name: Build Docker image
        working-directory: backend
        run: docker build -t truemarket-backend:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: truemarket-backend:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"   # падает workflow на HIGH+ — можно потом ослабить
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
