# ==============================================================================
# Локальный профиль (разработка). Поднимается через `make infra-up`.
# Все credentials — для локального docker-compose, в проде эти значения НЕ используются.
# ==============================================================================
spring:
  jpa:
    hibernate:
      ddl-auto: none   # Flyway — единственный источник схемы (ADR-007)
    show-sql: false
  datasource:
    url: jdbc:postgresql://localhost:5432/truemarket
    username: truemarket
    password: truemarket

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

truemarket:
  auth:
    jwt:
      # 64-байтный dev-секрет для HS512. В проде задаётся через env JWT_SECRET.
      secret: dev-secret-do-not-use-in-production-this-is-only-for-local-development-32b
    password:
      pwned-check-enabled: false   # haveibeenpwned-вызовы локально отключены
  storage:
    s3:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
  search:
    meilisearch:
      url: http://localhost:7700
      api-key: masterKey

logging:
  level:
    ru.truemarket: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
