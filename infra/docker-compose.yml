# ==============================================================================
# TrueMarket — локальный dev-стек.
# Запуск: `make infra-up` из корня проекта.
# Все credentials — для локальной разработки. В проде значения задаются через env/Vault.
# ==============================================================================
name: truemarket

services:

  # -------------------------- PostgreSQL --------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: truemarket-postgres
    environment:
      POSTGRES_DB: truemarket
      POSTGRES_USER: truemarket
      POSTGRES_PASSWORD: truemarket
      # Параметры для российской локали
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=100
      - -c
      - log_statement=none
      - -c
      - timezone=UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truemarket -d truemarket"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -------------------------- Redis -------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: truemarket-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - "allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # -------------------------- RabbitMQ (ADR-003) ------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: truemarket-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -------------------------- MinIO (S3-compatible) ---------------------------
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: truemarket-minio
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Console: http://localhost:9001 (minioadmin/minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_REGION: ru-central1
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      # Нативный health-эндпоинт MinIO. curl присутствует в образе с 2023 года.
      # `mc ready local` не используем — внутри контейнера нет настроенного alias 'local'.
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Создание бакетов при первом старте
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: truemarket-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/truemarket-products;
      mc mb --ignore-existing local/truemarket-documents;
      mc anonymous set download local/truemarket-products;
      echo 'MinIO buckets initialised';
      exit 0;
      "
    restart: "no"

  # -------------------------- Meilisearch (ADR-002) ---------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: truemarket-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  meili_data:

# ==============================================================================
# Подсказки:
#   docker compose -f infra/docker-compose.yml up -d         # старт
#   docker compose -f infra/docker-compose.yml down          # остановить
#   docker compose -f infra/docker-compose.yml down -v       # + удалить тома
#   docker compose -f infra/docker-compose.yml logs -f       # логи
# ==============================================================================
