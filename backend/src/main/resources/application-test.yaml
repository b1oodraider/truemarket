# ==============================================================================
# Профиль тестов (Testcontainers). Все datasource-properties перекрываются
# в @Testcontainers-классах через @DynamicPropertySource.
# ==============================================================================
spring:
  jpa:
    hibernate:
      ddl-auto: none   # Flyway — единственный источник схемы (ADR-007)
  flyway:
    enabled: true

truemarket:
  auth:
    jwt:
      secret: test-secret-for-tests-only-do-not-use-anywhere-else-just-for-junit-tests
    password:
      pwned-check-enabled: false
  rate-limit:
    enabled: false   # IT не требуют Redis; rate-limit проверяется в AuthRateLimitIT (enabled=true)

logging:
  level:
    ru.truemarket: DEBUG
    org.testcontainers: INFO
    com.github.dockerjava: WARN
