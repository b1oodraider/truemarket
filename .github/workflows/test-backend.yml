# ==============================================================================
# Backend: unit + архитектурные + интеграционные тесты.
# Покрытие проверяется JaCoCo (≥80% для бизнес-модулей, см. pom.xml).
# ==============================================================================
name: Backend tests

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/test-backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"

concurrency:
  group: test-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  unit-and-architecture:
    name: Unit + Architecture (Spring Modulith)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run unit + architecture tests
        working-directory: backend
        run: ./mvnw -B test

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  integration:
    name: Integration (Testcontainers)
    runs-on: ubuntu-latest
    needs: unit-and-architecture
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Verify Docker
        run: docker info

      - name: Run integration tests + JaCoCo
        working-directory: backend
        run: ./mvnw -B verify -P integration

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Upload Failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: backend/target/failsafe-reports/

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: unit-and-architecture
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build (skip tests, выполнены в other jobs)
        working-directory: backend
        run: ./mvnw -B -DskipTests package

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: truemarket-backend-jar
          path: backend/target/*.jar
          retention-days: 7
