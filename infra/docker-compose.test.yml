# ==============================================================================
# Тестовый стек для интеграционных тестов вне CI (например, отладка локально).
# В CI используются Testcontainers — этот compose НЕ обязателен.
# Порты сдвинуты на +1 чтобы не конфликтовать с dev-стеком.
# ==============================================================================
name: truemarket-test

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: truemarket-postgres-test
    environment:
      POSTGRES_DB: truemarket_test
      POSTGRES_USER: truemarket_test
      POSTGRES_PASSWORD: truemarket_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data        # tmpfs — быстрее, после стопа всё пропадает
    command:
      - postgres
      - -c
      - fsync=off                       # ускоряет тесты, для прода НЕДОПУСТИМО
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truemarket_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    container_name: truemarket-redis-test
    ports:
      - "6380:6379"
    command: redis-server --save "" --appendonly no

  rabbitmq-test:
    image: rabbitmq:3.13-management-alpine
    container_name: truemarket-rabbitmq-test
    ports:
      - "5673:5672"
      - "15673:15672"

  meilisearch-test:
    image: getmeili/meilisearch:v1.10
    container_name: truemarket-meilisearch-test
    ports:
      - "7701:7700"
    environment:
      MEILI_MASTER_KEY: testKey
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"

  minio-test:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: truemarket-minio-test
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: testadmin
      MINIO_ROOT_PASSWORD: testadmin
    command: server /data --console-address ":9001"
