# ==============================================================================
# Деплой бэкенда в staging-кластер k8s.
# Phase 0 — заглушка. Активируется в Phase 1 после появления infra/k8s/staging/.
#
# Триггер: merge в main.
# Требуемые secrets:
#   KUBE_CONFIG_STAGING   — base64-encoded ~/.kube/config staging-кластера
#   GHCR_TOKEN            — токен для push в GitHub Container Registry (можно GITHUB_TOKEN)
# ==============================================================================
name: Deploy staging

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/k8s/staging/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -d "infra/k8s/staging" ]; then
            echo "ready=true"  >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::infra/k8s/staging/ ещё не создан — workflow на паузе до Phase 1."
          fi

  build-image:
    needs: detect
    if: needs.detect.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: ./mvnw -B -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:staging
            ghcr.io/${{ github.repository }}/backend:sha-${{ github.sha }}

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Apply manifests
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
          kubectl apply -f infra/k8s/staging/
          kubectl set image deployment/truemarket-backend \
            backend=ghcr.io/${{ github.repository }}/backend:sha-${{ github.sha }} \
            -n truemarket-staging
          kubectl rollout status deployment/truemarket-backend -n truemarket-staging --timeout=5m
